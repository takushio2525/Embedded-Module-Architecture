[env:esp32-s3-cam-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16 (16MB Flash) のための設定 ---
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; --- R8 (8MB PSRAM) のための設定 ---
board_build.arduino.memory_type = qio_opi

; --- USB CDC（DP/DM ネイティブUSB）経由の書き込み＋シリアル ---
; ESP32-S3 の GPIO19(D-)/GPIO20(D+) から Serial 出力する
upload_protocol = esptool
board_upload.before_reset = usb_reset
board_upload.after_reset = hard_reset
monitor_rts = 0
monitor_dtr = 0

; --- ライブラリ依存 ---
; deep+: lib/内モジュールからLovyanGFX等の外部ライブラリヘッダを参照可能にする
lib_ldf_mode = deep+
lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    espressif/esp32-camera @ ^2.0.0

build_flags =
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -I include
    -I lib/ModuleCore
    -I lib/DisplayBoardModule
    -I lib/Mpu6500Module
    -I lib/ServoModule
    -I lib/SdModule
    -I lib/CameraModule
    -I lib/BleModule

; --- テスト設定 ---
test_framework = unity
test_speed = 115200
test_build_src = false
