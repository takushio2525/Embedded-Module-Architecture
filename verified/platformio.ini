[env:esp32-s3-cam-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16 (16MB Flash) のための設定 ---
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; --- R8 (8MB PSRAM) のための設定 ---
board_build.arduino.memory_type = qio_opi

; --- USB-CDC（OTGポート）経由の書き込み設定 ---
board_build.arduino.cdc_on_boot = 1
upload_protocol = esptool
board_upload.before_reset = usb_reset
board_upload.after_reset = hard_reset

; --- ライブラリ依存 ---
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    espressif/esp32-camera @ ^2.0.0

build_flags =
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -I include
    -I lib/ModuleCore
    -I lib/TftModule
    -I lib/TouchModule
    -I lib/Mpu6500Module
    -I lib/ServoModule
    -I lib/SdModule
    -I lib/CameraModule
    -I lib/BleModule

    ; ===== TFT_eSPI 設定（ILI9341 + XPT2046） =====
    ; ピンの正定義は ProjectConfig.h の各Configインスタンス。
    ; TFT_eSPIはbuild_flagsでのピン指定が必須のため、ここにも記載する。
    ; ピン変更時は ProjectConfig.h と同期すること。
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320

    ; SPI ピンアサイン（TFT + Touch + SD 共有バス → ProjectConfig.h SPI_MOSI_PIN等）
    -D TFT_MOSI=38
    -D TFT_MISO=40
    -D TFT_SCLK=39
    ; TFTピン（→ ProjectConfig.h TFT_CONFIG）
    -D TFT_CS=41
    -D TFT_DC=42
    -D TFT_RST=48

    ; タッチ（→ ProjectConfig.h TOUCH_CONFIG）
    -D TOUCH_CS=47

    ; SPI 通信速度
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000

    ; フォントサポート
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1

; --- テスト設定 ---
test_framework = unity
test_speed = 115200
test_build_src = false
; 1モジュールずつテストする場合:
;   pio test -f test_servo
;   pio test -f test_tft
; VSCodeのテストエクスプローラー（フラスコアイコン）からも個別実行可能
