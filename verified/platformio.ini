; デフォルトで本番環境のみビルド・書き込み対象にする
; テスト環境は -e オプションで明示指定（例: pio run -e test-mpu6500 -t upload）
[platformio]
default_envs = esp32-s3-cam-n16r8

; ===== 共通設定 =====
[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16 (16MB Flash) のための設定 ---
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; --- R8 (8MB PSRAM) のための設定 ---
board_build.arduino.memory_type = qio_opi

; --- USB CDC（DP/DM ネイティブUSB）経由の書き込み＋シリアル ---
; ESP32-S3 の GPIO19(D-)/GPIO20(D+) から Serial 出力する
upload_protocol = esptool
board_upload.before_reset = usb_reset
board_upload.after_reset = hard_reset
monitor_rts = 0
monitor_dtr = 0

; --- ライブラリ依存 ---
; deep+: lib/内モジュールからLovyanGFX等の外部ライブラリヘッダを参照可能にする
lib_ldf_mode = deep+
lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    espressif/esp32-camera @ ^2.0.0

build_flags =
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    ; ESP-IDF 5.3のI2Cドライバ衝突チェック回避:
    ; libdriver.a(i2c.c)のcheck_i2c_driver_conflictコンストラクタが
    ; i2c_acquire_bus_handle(libesp_driver_i2c.a)の存在を検知してabort()するため、
    ; シンボルをNULLに定義してチェックをバイパスする
    -Wl,--defsym=i2c_acquire_bus_handle=0
    -I include
    -I lib/ModuleCore
    -I lib/DisplayBoardModule
    -I lib/Mpu6500Module
    -I lib/ServoModule
    -I lib/SdModule
    -I lib/CameraModule
    -I lib/BleModule

; ===== 本番（全モジュール統合）=====
[env:esp32-s3-cam-n16r8]
extends = common

; ===== テスト: MPU-6500 IMUセンサー読み取り =====
; esp32-cameraはレガシーI2C APIを内部使用（MPU6500と同じ）
; IMUテストに不要なモジュールも除外（LovyanGFX依存等を回避）
[env:test-mpu6500]
extends = common
build_src_filter = -<*> +<../test/mpu6500_read/>
lib_deps =
lib_ignore = LovyanGFX, esp32-camera, DisplayBoardModule, CameraModule, SdModule, ServoModule, BleModule

; ===== テスト: サーボ スイープ動作 =====
[env:test-servo]
extends = common
build_src_filter = -<*> +<../test/servo_sweep/>

; ===== テスト: カメラ キャプチャ =====
[env:test-camera]
extends = common
build_src_filter = -<*> +<../test/camera_capture/>

; ===== テスト: SDカード読み書き =====
[env:test-sd]
extends = common
build_src_filter = -<*> +<../test/sd_readwrite/>

; ===== テスト: TFT表示 + タッチ入力 =====
[env:test-display]
extends = common
build_src_filter = -<*> +<../test/display_touch/>

; ===== テスト: BLE エコーバック =====
[env:test-ble]
extends = common
build_src_filter = -<*> +<../test/ble_echo/>
