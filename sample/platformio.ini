[env:esp32-s3-cam-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16 (16MB Flash) のための設定 ---
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; --- R8 (8MB PSRAM) のための設定 ---
board_build.arduino.memory_type = qio_opi

; --- ライブラリ依存 ---
; esp_camera, BLEはESP32 Arduinoフレームワーク同梱のため lib_deps への追加不要
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

build_flags =
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -I include
    -I lib/ModuleCore
    -I lib/LedModule
    -I lib/DisplayBoardModule
    -I lib/Mpu6500Module
    -I lib/CameraModule
    -I lib/ServoModule
    -I lib/DriveMotorModule
    -I lib/ChassisModule
    -I lib/ButtonModule
    -I lib/BleModule
    -I lib/BatteryModule
    -I lib/BuzzerModule
    -I lib/WifiModule
    -I lib/EncoderModule

    ; ===== TFT_eSPI 設定 =====
    ; 注意: ピン番号はハードウェア配線に合わせて変更すること
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320

    ; SPI ピンアサイン（HSPI）
    -D TFT_MOSI=47
    -D TFT_SCLK=21
    -D TFT_MISO=48
    -D TFT_CS=45
    -D TFT_DC=40
    -D TFT_RST=39

    ; タッチ (XPT2046, TFT_eSPI内蔵対応)
    -D TOUCH_CS=38

    ; SPI 通信速度
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000

    ; フォントサポート
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
